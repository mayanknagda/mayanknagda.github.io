<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Mayank Nagda's personal website.">
  <title>Mayank Nagda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="page">
    <header class="intro">
      <h1 id="name">Mayank Nagda</h1>
      <ul class="meta-list" id="meta"></ul>
    </header>

    <section class="section" id="new">
      <h2>new</h2>
      <ul class="item-list" id="new-list"></ul>
      <details class="section-details" id="new-details">
        <summary>older updates</summary>
        <ul class="item-list" id="new-list-archive"></ul>
      </details>
    </section>

    <section class="section" id="bio">
      <h2>bio</h2>
      <div class="bio" id="bio-text"></div>
    </section>

    <section class="section" id="timeline">
      <h2>timeline</h2>
      <div class="timeline-group">
        <h3>work experience</h3>
        <ul class="timeline" id="timeline-experience"></ul>
      </div>
      <div class="timeline-group">
        <h3>education</h3>
        <ul class="timeline" id="timeline-education"></ul>
      </div>
    </section>

    <section class="section" id="publications">
      <h2>publications</h2>
      <ul class="item-list" id="publications-list"></ul>
      <p class="section-note">
        full list on <a href="https://scholar.google.com/citations?user=-3n5lpYAAAAJ&hl=en" target="_blank"
          rel="noopener">google scholar</a>.
      </p>
    </section>

    <section class="section" id="misc">
      <h2>misc</h2>
      <ul class="item-list" id="misc-list"></ul>
    </section>
  </main>

  <footer class="footer" id="footer"></footer>

  <script src="script.js" defer></script>
</body>

</html>
