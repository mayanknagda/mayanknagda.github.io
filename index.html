<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <meta name="description" content="Portfolio website for Mayank Nagda, a Generative AI researcher and engineer.">
  <title>Mayank Nagda | Generative AI Researcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="home">
  <noscript class="noscript">This website needs JavaScript enabled to display the latest content.</noscript>
  <div class="site">
    <header class="site-header" id="top">
      <a class="brand" href="#top" aria-label="Go to top">
        <span class="brand__title" id="brand-name">Mayank Nagda</span>
        <span class="brand__subtitle" id="brand-tagline"></span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="index.html" data-nav="home">Home</a>
        <a href="index.html#experience">Experience</a>
        <a href="projects.html" data-nav="projects">Projects</a>
        <a href="publications.html" data-nav="publications">Publications</a>
        <a href="index.html#skills">Skills</a>
      </nav>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle color theme">
        <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true"></span>
        <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true"></span>
      </button>
    </header>

    <main class="site-main" id="main">
      <section class="hero" id="hero">
        <div class="hero__background" aria-hidden="true"></div>
        <div class="hero__content">
          <p class="hero__pretitle" id="hero-intro"></p>
          <h1 class="hero__title" id="hero-title">AI Researcher & Engineer</h1>
          <p class="hero__summary" id="hero-summary"></p>
          <div class="hero__meta" id="hero-meta"></div>
          <div class="hero__actions" id="hero-actions"></div>
        </div>
      </section>

      <section class="section" id="experience">
        <div class="section__header">
          <h2>Experience</h2>
          <p class="section__lede" id="experience-intro"></p>
        </div>
        <div class="card-grid" id="experience-list"></div>
      </section>

      <section class="section" id="projects">
        <div class="section__header">
          <h2>Projects</h2>
          <p class="section__lede" id="projects-intro"></p>
        </div>
        <div class="card-grid" id="projects-list"></div>
        <div class="section__actions" id="projects-actions"></div>
      </section>

      <section class="section" id="education">
        <div class="section__header">
          <h2>Education</h2>
          <p class="section__lede" id="education-intro"></p>
        </div>
        <div class="card-grid card-grid--two" id="education-list"></div>
      </section>

      <section class="section" id="publications">
        <div class="section__header">
          <h2>Selected Publications</h2>
          <p class="section__lede" id="publications-intro"></p>
        </div>
        <div class="card-list" id="publications-list"></div>
        <div class="section__actions" id="publications-actions"></div>
      </section>

      <section class="section" id="skills">
        <div class="section__header">
          <h2>Skills</h2>
          <p class="section__lede" id="skills-intro"></p>
        </div>
        <div class="skill-grid" id="skills-list"></div>
      </section>
    </main>

    <footer class="site-footer" id="footer">
      <div class="site-footer__meta" id="footer-note"></div>
      <div class="site-footer__links" id="footer-links"></div>
    </footer>
  </div>
  <script src="script.js" defer></script>
</body>
</html>
