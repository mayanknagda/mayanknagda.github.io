name: Generate misc index

on:
  push:
    branches: ["main"]
    paths:
      - "misc/**"
      - "scripts/generate-misc-index.js"
      - "scripts/generate-misc-pages.js"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate index
        run: node scripts/generate-misc-index.js
      - name: Generate html pages
        run: node scripts/generate-misc-pages.js
      - name: Commit outputs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add misc/index.json misc/*.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update misc pages"
          git push
